<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnBase Automação - POUPEX FHE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 1200px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .card h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon {
            width: 24px;
            height: 24px;
            fill: #2196F3;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .status-active {
            background: #4CAF50;
            animation: pulse 2s infinite;
        }

        .status-inactive {
            background: #f44336;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .button {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        .button.success {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        }

        .button.danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 10px;
            border-left: 4px solid #2196F3;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #2196F3;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .log-container {
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
        }

        .timestamp {
            color: #888;
        }

        .config-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2196F3;
        }

        .sector-mapping {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .sector-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50 0%, #45a049 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid;
        }

        .alert.success {
            background: #e8f5e8;
            border-color: #4CAF50;
            color: #2e7d2e;
        }

        .alert.error {
            background: #ffeaea;
            border-color: #f44336;
            color: #c62828;
        }

        .alert.info {
            background: #e3f2fd;
            border-color: #2196F3;
            color: #1565c0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OnBase Automação</h1>
            <p>Sistema Inteligente de Classificação de Documentos - POUPEX FHE</p>
        </div>

        <div class="main-content">
            <!-- Alertas -->
            <div id="alertContainer"></div>

            <!-- Dashboard Principal -->
            <div class="dashboard-grid">
                <!-- Status do Sistema -->
                <div class="card">
                    <h3>
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M11,16.5L6.5,12L7.91,10.59L11,13.67L16.59,8.09L18,9.5L11,16.5Z"/>
                        </svg>
                        Status do Sistema
                    </h3>
                    <div>
                        <span class="status-indicator" id="systemStatus"></span>
                        <span id="statusText">Sistema Parado</span>
                    </div>
                    <div style="margin-top: 20px;">
                        <button class="button success" onclick="startAutomation()">Iniciar</button>
                        <button class="button danger" onclick="stopAutomation()">Parar</button>
                        <button class="button" onclick="processNow()">Processar Agora</button>
                    </div>
                    <div style="margin-top: 15px;">
                        <label>
                            <input type="checkbox" id="autoMode" checked> Modo Automático
                        </label>
                    </div>
                </div>

                <!-- Estatísticas -->
                <div class="card">
                    <h3>
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M22,21H2V3H4V19H6V10H10V19H12V6H16V19H18V14H22V21Z"/>
                        </svg>
                        Estatísticas de Hoje
                    </h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-number" id="totalDocs">0</div>
                            <div class="stat-label">Total</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="successDocs">0</div>
                            <div class="stat-label">Sucessos</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="failedDocs">0</div>
                            <div class="stat-label">Falhas</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="successRate">0%</div>
                            <div class="stat-label">Taxa Sucesso</div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressBar" style="width: 0%;"></div>
                    </div>
                </div>

                <!-- Setores -->
                <div class="card">
                    <h3>
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/>
                        </svg>
                        Setores Ativos
                    </h3>
                    <div class="sector-mapping" id="sectorsList">
                        <!-- Setores serão carregados dinamicamente -->
                    </div>
                </div>
            </div>

            <!-- Log de Atividades -->
            <div class="card">
                <h3>
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M13,9H18.5L13,3.5V9M6,2H14L20,8V20A2,2 0 0,1 18,22H6C4.89,22 4,21.1 4,20V4C4,2.89 4.89,2 6,2M15,18V16H6V18H15M18,14V12H6V14H18Z"/>
                    </svg>
                    Log de Atividades
                </h3>
                <div class="log-container" id="logContainer">
                    <div class="log-entry">
                        <span class="timestamp">[--:--:--]</span> Sistema inicializado
                    </div>
                </div>
            </div>

            <!-- Configurações -->
            <div class="config-section">
                <h3>⚙️ Configurações do Sistema</h3>
                <div class="dashboard-grid">
                    <div class="form-group">
                        <label for="processingInterval">Intervalo de Processamento (horas)</label>
                        <select id="processingInterval">
                            <option value="1">1 hora</option>
                            <option value="2" selected>2 horas</option>
                            <option value="4">4 horas</option>
                            <option value="6">6 horas</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="maxDocuments">Máximo de Documentos por Execução</label>
                        <input type="number" id="maxDocuments" value="100" min="1" max="1000">
                    </div>
                    <div class="form-group">
                        <label for="confidenceThreshold">Limite de Confiança (%)</label>
                        <input type="number" id="confidenceThreshold" value="70" min="50" max="100">
                    </div>
                </div>
                <button class="button" onclick="saveConfiguration()">Salvar Configurações</button>
            </div>
        </div>
    </div>

    <script>
        // Estado do sistema
        let systemRunning = false;
        let autoMode = true;
        let processingInterval = null;

        // Dados dos setores
        const sectors = [
            { name: 'RECURSOS_HUMANOS', label: 'Recursos Humanos', count: 0, color: '#FF5722' },
            { name: 'CONTRATOS', label: 'Contratos', count: 0, color: '#9C27B0' },
            { name: 'FINANCEIRO', label: 'Financeiro', count: 0, color: '#4CAF50' },
            { name: 'JURIDICO', label: 'Jurídico', count: 0, color: '#FF9800' },
            { name: 'PRESIDENCIA', label: 'Presidência', count: 0, color: '#2196F3' },
            { name: 'TECNOLOGIA', label: 'Tecnologia', count: 0, color: '#00BCD4' },
            { name: 'AUDITORIA', label: 'Auditoria', count: 0, color: '#795548' },
            { name: 'COMERCIAL', label: 'Comercial', count: 0, color: '#607D8B' }
        ];

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            loadSectors();
            updateStatus();
            updateStatistics();
            startLogSimulation();
        });

        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.innerHTML = message;
            alertContainer.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        function startAutomation() {
            systemRunning = true;
            autoMode = document.getElementById('autoMode').checked;
            updateStatus();
            showAlert('✅ Automação iniciada com sucesso!', 'success');
            logMessage('Automação iniciada pelo usuário');
            
            if (autoMode) {
                const interval = parseInt(document.getElementById('processingInterval').value) * 3600000; // em ms
                processingInterval = setInterval(simulateProcessing, interval);
                logMessage(`Modo automático ativado - processamento a cada ${interval/3600000}h`);
            }
        }

        function stopAutomation() {
            systemRunning = false;
            if (processingInterval) {
                clearInterval(processingInterval);
                processingInterval = null;
            }
            updateStatus();
            showAlert('⏹️ Automação parada', 'info');
            logMessage('Automação parada pelo usuário');
        }

        function processNow() {
            if (!systemRunning) {
                showAlert('⚠️ Inicie a automação primeiro!', 'error');
                return;
            }
            
            logMessage('Processamento manual iniciado...');
            simulateProcessing();
        }

        function simulateProcessing() {
            const numDocs = Math.floor(Math.random() * 20) + 5; // 5-25 documentos
            const successRate = 0.85 + Math.random() * 0.1; // 85-95% de sucesso
            const successCount = Math.floor(numDocs * successRate);
            const failCount = numDocs - successCount;

            // Atualizar estatísticas
            const currentTotal = parseInt(document.getElementById('totalDocs').textContent);
            const currentSuccess = parseInt(document.getElementById('successDocs').textContent);
            const currentFailed = parseInt(document.getElementById('failedDocs').textContent);

            document.getElementById('totalDocs').textContent = currentTotal + numDocs;
            document.getElementById('successDocs').textContent = currentSuccess + successCount;
            document.getElementById('failedDocs').textContent = currentFailed + failCount;

            const newTotal = currentTotal + numDocs;
            const newSuccess = currentSuccess + successCount;
            const newSuccessRate = newTotal > 0 ? Math.round((newSuccess / newTotal) * 100) : 0;
            
            document.getElementById('successRate').textContent = newSuccessRate + '%';
            document.getElementById('progressBar').style.width = newSuccessRate + '%';

            // Distribuir documentos pelos setores
            for (let i = 0; i < successCount; i++) {
                const randomSector = sectors[Math.floor(Math.random() * sectors.length)];
                randomSector.count++;
            }
            loadSectors();

            logMessage(`Processamento concluído: ${successCount}/${numDocs} documentos classificados`);
            
            if (failCount > 0) {
                logMessage(`⚠️ ${failCount} documentos falharam na classificação`, 'warning');
            }

            showAlert(`📄 ${numDocs} documentos processados (${successCount} sucessos)`, 'success');
        }

        function updateStatus() {
            const statusIndicator = document.getElementById('systemStatus');
            const statusText = document.getElementById('statusText');
            
            if (systemRunning) {
                statusIndicator.className = 'status-indicator status-active';
                statusText.textContent = 'Sistema Ativo - Monitorando OnBase';
            } else {
                statusIndicator.className = 'status-indicator status-inactive';
                statusText.textContent = 'Sistema Parado';
            }
        }

        function updateStatistics() {
            // Simular estatísticas iniciais
            const stats = {
                total: Math.floor(Math.random() * 100) + 50,
                success: 0,
                failed: 0
            };
            
            stats.success = Math.floor(stats.total * 0.9);
            stats.failed = stats.total - stats.success;
            stats.rate = Math.round((stats.success / stats.total) * 100);

            document.getElementById('totalDocs').textContent = stats.total;
            document.getElementById('successDocs').textContent = stats.success;
            document.getElementById('failedDocs').textContent = stats.failed;
            document.getElementById('successRate').textContent = stats.rate + '%';
            document.getElementById('progressBar').style.width = stats.rate + '%';
        }

        function loadSectors() {
            const container = document.getElementById('sectorsList');
            container.innerHTML = '';
            
            sectors.forEach(sector => {
                const sectorElement = document.createElement('div');
                sectorElement.className = 'sector-item';
                sectorElement.innerHTML = `
                    <h4 style="color: ${sector.color}; margin-bottom: 10px;">${sector.label}</h4>
                    <div style="font-size: 2em; font-weight: bold; color: ${sector.color};">${sector.count}</div>
                    <div style="color: #666; font-size: 0.9em;">documentos</div>
                `;
                container.appendChild(sectorElement);
            });
        }

        function logMessage(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString('pt-BR');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            
            let icon = '';
            if (type === 'warning') icon = '⚠️ ';
            if (type === 'error') icon = '❌ ';
            if (type === 'success') icon = '✅ ';
            
            logEntry.innerHTML = `
                <span class="timestamp">[${timestamp}]</span> ${icon}${message}
            `;
            
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
            
            // Manter apenas as últimas 50 entradas
            while (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.firstChild);
            }
        }

        function startLogSimulation() {
            // Simular atividades do sistema
            const activities = [
                'Conectando ao OnBase...',
                'Verificando documentos pendentes...',
                'Classificador IA carregado',
                'Monitoramento iniciado',
                'Sistema pronto para uso'
            ];
            
            activities.forEach((activity, index) => {
                setTimeout(() => {
                    logMessage(activity);
                }, index * 1000);
            });
        }

        function saveConfiguration() {
            const config = {
                processingInterval: document.getElementById('processingInterval').value,
                maxDocuments: document.getElementById('maxDocuments').value,
                confidenceThreshold: document.getElementById('confidenceThreshold').value
            };
            
            // Simular salvamento
            localStorage.setItem('onbaseConfig', JSON.stringify(config));
            showAlert('⚙️ Configurações salvas com sucesso!', 'success');
            logMessage('Configurações atualizadas pelo usuário');
        }

        // Carregar configurações salvas
        window.addEventListener('load', function() {
            const savedConfig = localStorage.getItem('onbaseConfig');
            if (savedConfig) {
                const config = JSON.parse(savedConfig);
                document.getElementById('processingInterval').value = config.processingInterval || '2';
                document.getElementById('maxDocuments').value = config.maxDocuments || '100';
                document.getElementById('confidenceThreshold').value = config.confidenceThreshold || '70';
            }
        });

        // Simular atualizações em tempo real
        setInterval(() => {
            if (systemRunning && Math.random() < 0.1) { // 10% chance por minuto
                const activities = [
                    'Documento classificado automaticamente',
                    'Verificando novos documentos...',
                    'Backup de configurações realizado',
                    'Conectividade OnBase verificada'
                ];
                const randomActivity = activities[Math.floor(Math.random() * activities.length)];
                logMessage(randomActivity);
            }
        }, 60000); // A cada minuto
    </script>
</body>
</html>
